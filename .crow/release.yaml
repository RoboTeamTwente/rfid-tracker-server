# yaml-language-server: $schema=https://raw.githubusercontent.com/woodpecker-ci/woodpecker/main/pipeline/frontend/yaml/linter/schema/schema.json

when:
  - event: tag
    ref: refs/tags/v*

steps:
  setup:
    image: nixos/nix@sha256:bf1d938835ab96312f098fa6c2e9cab367728e0aad0646ee3e02a787c80d8fb8
    privileged: true
    volumes:
      - /nix:/mnt/nix
    commands:
      - echo 'experimental-features = nix-command flakes' >> /etc/nix/nix.conf
      - echo 'max-jobs = auto' >> /etc/nix/nix.conf
      - echo 'store = unix:///mnt/nix/var/nix/daemon-socket/socket?root=/mnt' >> /etc/nix/nix.conf
      - nix develop -Lc true

  upload:
    image: nixos/nix@sha256:bf1d938835ab96312f098fa6c2e9cab367728e0aad0646ee3e02a787c80d8fb8
    privileged: true
    volumes:
      - /nix:/mnt/nix
    depends_on: setup
    environment:
      DOCKERHUB_TOKEN:
        from_secret: dockerhub_token
    commands:
      - echo 'experimental-features = nix-command flakes' >> /etc/nix/nix.conf
      - echo 'max-jobs = auto' >> /etc/nix/nix.conf
      - echo 'store = unix:///mnt/nix/var/nix/daemon-socket/socket?root=/mnt' >> /etc/nix/nix.conf
      - nix develop -Lc skopeo login docker.io -u roboteamtwente -p "$DOCKERHUB_TOKEN"
      - nix develop -Lc just upload-image

  release:
    image: nixos/nix@sha256:bf1d938835ab96312f098fa6c2e9cab367728e0aad0646ee3e02a787c80d8fb8
    privileged: true
    volumes:
      - /nix:/mnt/nix
    depends_on: setup
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - echo 'experimental-features = nix-command flakes' >> /etc/nix/nix.conf
      - echo 'max-jobs = auto' >> /etc/nix/nix.conf
      - echo 'store = unix:///mnt/nix/var/nix/daemon-socket/socket?root=/mnt' >> /etc/nix/nix.conf
      - nix develop -Lc sh -c 'gh release new "$CI_COMMIT_TAG" --notes "$(git cliff --latest --strip all)"'
