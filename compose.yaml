services:
  serve:
    build: door_tracker
    ports:
      - 8001:8000
    volumes:
      - db:/db
      - ./credentials:/credentials
    environment:
      - DATABASE_URL=sqlite:///db/db.sqlite3
      - DJANGO_BACKUP_CREDENTIALS_FILE=/credentials/service-account.json
      - DJANGO_BACKUP_SHARED_DRIVE_ID=REPLACE_ME
      - DJANGO_BACKUP_FOLDER_NAME=REPLACE_ME
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - ADMIN_EMAIL=admin@localhost
    develop:
      watch:
        - path: door_tracker/
          target: /app
          ignore: .venv
          action: sync
        - path: door_tracker/pyproject.toml
          action: rebuild
volumes:
  db:
